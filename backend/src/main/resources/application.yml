spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: expense-backend
  jackson:
    time-zone: ${APP_TIME_ZONE:Asia/Shanghai}
    date-format: yyyy-MM-dd HH:mm:ss
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: ${FLYWAY_BASELINE_VERSION:0}
    baseline-description: Existing schema before Flyway
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:3MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:12MB}

server:
  port: ${SERVER_PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) %clr([%15.15thread]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n%wEx"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%15.15thread] %-40.40logger{39} : %msg%n%wEx"
  file:
    name: ${LOG_FILE:logs/expense-backend.log}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:10MB}
      max-history: ${LOG_MAX_HISTORY:14}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  time-zone: ${APP_TIME_ZONE:Asia/Shanghai}
  deployment:
    # 前后端共用的部署版本。生产可用环境变量覆盖，默认值用于本地开发。
    version: ${EXPENSE_DEPLOYMENT_VERSION:local-dev}
  admin:
    # 逗号分隔的管理员用户名列表，只有已存在且未禁用的用户会获得后台权限。
    usernames: ${ADMIN_USERNAMES:}
  security:
    login-rate-limit:
      # 同一用户名 + 客户端 IP 在窗口期内允许的失败次数，超过后暂时拒绝登录请求。
      max-failures: ${LOGIN_RATE_LIMIT_MAX_FAILURES:5}
      window-minutes: ${LOGIN_RATE_LIMIT_WINDOW_MINUTES:10}
      block-minutes: ${LOGIN_RATE_LIMIT_BLOCK_MINUTES:15}
  jwt:
    # 用于签发和校验 Access Token，生产环境必须通过环境变量覆盖。
    secret: ${JWT_SECRET:please-change-this-dev-secret-32-bytes-min}
    access-token-minutes: ${JWT_ACCESS_MINUTES:30}
    refresh-token-days: ${JWT_REFRESH_DAYS:14}
  mail:
    from: ${MAIL_FROM:noreply@example.com}
    local-log-enabled: ${MAIL_LOCAL_LOG_ENABLED:true}
  storage:
    transaction-image-dir: ${TRANSACTION_IMAGE_DIR:uploads/transaction-images}
    transaction-image-retention-days: ${TRANSACTION_IMAGE_RETENTION_DAYS:7}
  ocr:
    enabled: ${OCR_ENABLED:false}
    provider: ${OCR_PROVIDER:disabled}
    local:
      base-url: ${LOCAL_OCR_BASE_URL:http://localhost:9000}
