name: CD

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - name: Ensure manual deploy uses main
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "手动部署只能从 main 分支触发，当前分支: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Check required secrets
        env:
          CD_SSH_HOST: ${{ secrets.CD_SSH_HOST }}
          CD_SSH_USER: ${{ secrets.CD_SSH_USER }}
          CD_SSH_PRIVATE_KEY: ${{ secrets.CD_SSH_PRIVATE_KEY }}
          CD_SSH_PRIVATE_KEY_BASE64: ${{ secrets.CD_SSH_PRIVATE_KEY_BASE64 }}
          CD_DEPLOY_PATH: ${{ secrets.CD_DEPLOY_PATH }}
        run: |
          missing=0
          for name in CD_SSH_HOST CD_SSH_USER CD_DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::缺少 GitHub Secret: $name"
              missing=1
            fi
          done
          if [ -z "$CD_SSH_PRIVATE_KEY" ] && [ -z "$CD_SSH_PRIVATE_KEY_BASE64" ]; then
            echo "::error::缺少 GitHub Secret: CD_SSH_PRIVATE_KEY 或 CD_SSH_PRIVATE_KEY_BASE64"
            missing=1
          fi
          exit "$missing"

      - name: Configure SSH
        env:
          CD_SSH_HOST: ${{ secrets.CD_SSH_HOST }}
          CD_SSH_PORT: ${{ secrets.CD_SSH_PORT }}
          CD_SSH_PRIVATE_KEY: ${{ secrets.CD_SSH_PRIVATE_KEY }}
          CD_SSH_PRIVATE_KEY_BASE64: ${{ secrets.CD_SSH_PRIVATE_KEY_BASE64 }}
        run: |
          port="${CD_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          if [ -n "$CD_SSH_PRIVATE_KEY_BASE64" ]; then
            printf '%s' "$CD_SSH_PRIVATE_KEY_BASE64" | base64 -d > ~/.ssh/cd_deploy_key
          else
            printf '%b\n' "$CD_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/cd_deploy_key
          fi
          chmod 600 ~/.ssh/cd_deploy_key
          ssh-keygen -y -f ~/.ssh/cd_deploy_key >/dev/null
          ssh-keyscan -p "$port" -H "$CD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          CD_SSH_HOST: ${{ secrets.CD_SSH_HOST }}
          CD_SSH_PORT: ${{ secrets.CD_SSH_PORT }}
          CD_SSH_USER: ${{ secrets.CD_SSH_USER }}
          CD_DEPLOY_PATH: ${{ secrets.CD_DEPLOY_PATH }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          port="${CD_SSH_PORT:-22}"
          ssh -i ~/.ssh/cd_deploy_key -p "$port" "$CD_SSH_USER@$CD_SSH_HOST" "bash -s -- '$CD_DEPLOY_PATH' '$DEPLOY_SHA'" <<'REMOTE'
          set -euo pipefail

          deploy_path="$1"
          deploy_sha="$2"
          cd "$deploy_path"

          current_branch="$(git rev-parse --abbrev-ref HEAD)"
          if [ "$current_branch" != "main" ]; then
            echo "生产目录当前分支为 $current_branch，请先切换并跟踪 main 后再启用 CD。"
            exit 1
          fi

          git fetch origin main
          main_sha="$(git rev-parse origin/main)"
          if [ "$main_sha" != "$deploy_sha" ]; then
            echo "触发 CD 的提交 $deploy_sha 已不是 origin/main 当前提交 $main_sha，跳过本次部署。"
            echo "等待最新 main 提交通过 CI 后，由新的 CD 运行负责部署。"
            exit 1
          fi

          git pull --ff-only origin main

          compose() {
            sudo -n docker compose -f docker-compose.prod.yml -f docker-compose.server.yml "$@"
          }

          compose config --quiet
          compose build backend
          compose build frontend
          compose up -d
          compose ps

          for attempt in $(seq 1 60); do
            if curl -fsSI http://127.0.0.1:8088/ >/dev/null; then
              status="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8088/api/v1/auth/me || true)"
              if [ "$status" = "401" ]; then
                echo "生产探活通过。"
                exit 0
              fi
              echo "等待 API 探活返回 401，当前返回 $status，尝试 $attempt/60。"
            else
              echo "等待前端首页可访问，尝试 $attempt/60。"
            fi
            sleep 3
          done

          status="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8088/api/v1/auth/me || true)"
          echo "API 未登录探活预期返回 401，实际返回 $status"
          exit 1
          REMOTE
