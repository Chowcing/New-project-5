services:
  mysql:
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=SYSTEM
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
    mem_limit: 768m

  backend:
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -XX:InitialRAMPercentage=30 -Duser.timezone=${APP_TIME_ZONE:-Asia/Shanghai}"
    mem_limit: 768m

  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env before production deploy}
      - --maxmemory
      - 192mb
      - --maxmemory-policy
      - noeviction
    mem_limit: 256m

  frontend:
    mem_limit: 128m

  ocr-service:
    mem_limit: 768m
