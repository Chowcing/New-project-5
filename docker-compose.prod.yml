services:
  mysql:
    image: mysql:8.4
    container_name: expense-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expense_tracker}
      MYSQL_USER: ${MYSQL_USER:-expense_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-app}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - expense_mysql_prod_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: expense-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-expense_tracker}
      DB_USER: ${MYSQL_USER:-expense_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change-me-app}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-prod-secret-32-bytes-min}
    volumes:
      - ./logs/backend:/app/logs

  frontend:
    build:
      context: ./frontend
    container_name: expense-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  expense_mysql_prod_data:
