services:
  mysql:
    image: mysql:8.4
    container_name: expense-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env before production deploy}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expense_tracker}
      MYSQL_USER: ${MYSQL_USER:-expense_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env before production deploy}
      TZ: ${APP_TIME_ZONE:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=SYSTEM
    volumes:
      - expense_mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./backend
      args:
        EXPENSE_DEPLOYMENT_VERSION: ${EXPENSE_DEPLOYMENT_VERSION:?Set EXPENSE_DEPLOYMENT_VERSION before production deploy}
    container_name: expense-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-expense_tracker}
      DB_USER: ${MYSQL_USER:-expense_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env before production deploy}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before production deploy}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_VERSION: ${FLYWAY_BASELINE_VERSION:-0}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Shanghai}
      TRANSACTION_IMAGE_DIR: ${TRANSACTION_IMAGE_DIR:-/app/uploads/transaction-images}
      TRANSACTION_IMAGE_RETENTION_DAYS: ${TRANSACTION_IMAGE_RETENTION_DAYS:-7}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_PROVIDER: ${OCR_PROVIDER:-disabled}
      LOCAL_OCR_BASE_URL: ${LOCAL_OCR_BASE_URL:-http://ocr-service:9000}
      EXPENSE_DEPLOYMENT_VERSION: ${EXPENSE_DEPLOYMENT_VERSION:?Set EXPENSE_DEPLOYMENT_VERSION before production deploy}
      TZ: ${APP_TIME_ZONE:-Asia/Shanghai}
      JAVA_TOOL_OPTIONS: "-Duser.timezone=${APP_TIME_ZONE:-Asia/Shanghai}"
    volumes:
      - ./logs/backend:/app/logs
      - ./uploads:/app/uploads

  ocr-service:
    build:
      context: ./ocr-service
      args:
        PYTHON_BASE_IMAGE: ${OCR_PYTHON_BASE_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${OCR_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${OCR_PIP_EXTRA_INDEX_URL:-}
        PIP_DEFAULT_TIMEOUT: ${OCR_PIP_DEFAULT_TIMEOUT:-120}
    container_name: expense-ocr-service
    restart: unless-stopped
    environment:
      TZ: ${APP_TIME_ZONE:-Asia/Shanghai}
    profiles:
      - ocr

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        EXPENSE_DEPLOYMENT_VERSION: ${EXPENSE_DEPLOYMENT_VERSION:?Set EXPENSE_DEPLOYMENT_VERSION before production deploy}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
        VITE_AMAP_CITY: ${VITE_AMAP_CITY:-}
    container_name: expense-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  expense_mysql_prod_data:
