services:
  mysql:
    image: mysql:8.4
    container_name: expense-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env before production deploy}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expense_tracker}
      MYSQL_USER: ${MYSQL_USER:-expense_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env before production deploy}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - expense_mysql_prod_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./backend
      args:
        EXPENSE_DEPLOYMENT_VERSION: ${EXPENSE_DEPLOYMENT_VERSION:-local-dev}
    container_name: expense-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-expense_tracker}
      DB_USER: ${MYSQL_USER:-expense_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env before production deploy}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before production deploy}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      TRANSACTION_IMAGE_DIR: ${TRANSACTION_IMAGE_DIR:-/app/uploads/transaction-images}
      EXPENSE_DEPLOYMENT_VERSION: ${EXPENSE_DEPLOYMENT_VERSION:-local-dev}
    volumes:
      - ./logs/backend:/app/logs
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        EXPENSE_DEPLOYMENT_VERSION: ${EXPENSE_DEPLOYMENT_VERSION:-local-dev}
        VITE_AMAP_KEY: ${VITE_AMAP_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
        VITE_AMAP_CITY: ${VITE_AMAP_CITY:-}
    container_name: expense-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  expense_mysql_prod_data:
