services:
  mysql:
    image: mysql:8.4
    container_name: expense-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expense_tracker}
      MYSQL_USER: ${MYSQL_USER:-expense_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-app}
      TZ: ${APP_TIME_ZONE:-Asia/Shanghai}
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=SYSTEM
    volumes:
      - expense_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: expense-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ocr-service:
    build:
      context: ./ocr-service
      args:
        PYTHON_BASE_IMAGE: ${OCR_PYTHON_BASE_IMAGE:-python:3.11-slim}
        PIP_INDEX_URL: ${OCR_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${OCR_PIP_EXTRA_INDEX_URL:-}
        PIP_DEFAULT_TIMEOUT: ${OCR_PIP_DEFAULT_TIMEOUT:-120}
    container_name: expense-ocr-service-dev
    restart: unless-stopped
    ports:
      - "9000:9000"
    profiles:
      - ocr

volumes:
  expense_mysql_data:
